<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지 제목</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #333;
      background-color: #fff;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 1rem 2rem;
    }

    header h1 {
      font-size: 1.5rem;
    }

    nav {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    nav a {
      color: #ecf0f1;
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    section {
      margin-bottom: 2rem;
    }

    section h2 {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
      color: #2c3e50;
    }

    section p {
      color: #555;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #888;
      border-top: 1px solid #eee;
      margin-top: 3rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>사이트 제목</h1>
    <nav>
      <a href="#">홈</a>
      <a href="#">소개</a>
      <a href="#">서비스</a>
      <a href="#">연락처</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>환영합니다</h2>
      <p>여기에 메인 콘텐츠를 작성하세요.</p>
    </section>

    <section>
      <h2>소개</h2>
      <p>이 섹션에 원하는 내용을 추가할 수 있습니다.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 사이트 이름. 모든 권리 보유.</p>
  </footer>

  <script>
    // 여기에 JavaScript 코드를 작성하세요
    console.log('페이지가 로드되었습니다.');
  </script>

</body>
</html>
